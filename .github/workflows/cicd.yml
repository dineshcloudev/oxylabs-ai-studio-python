name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
    # Avoid infinite loop when this workflow commits only the image bump.
    paths-ignore:
      - helm/ai-studio/values.yaml

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  python:
    name: Python checks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install ChatOps dependencies
        if: ${{ hashFiles('chatops/requirements.txt') != '' }}
        run: uv pip install -r chatops/requirements.txt

      - name: Format check
        run: uv run ruff format --check ./src ./chatops

      - name: Lint
        run: uv run ruff check ./src ./chatops

      - name: Type check
        run: uv run mypy ./src

      - name: Syntax check
        run: uv run python -m compileall -q ./src ./chatops

  helm:
    name: Helm checks
    runs-on: self-hosted
    needs: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.20.0
      - run: helm lint helm/ai-studio
      - run: helm template ai-studio helm/ai-studio > /dev/null

  docker:
    name: Docker build (and push on main)
    runs-on: self-hosted
    needs: [helm]
    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        name: Compute image name and tag
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}

  bump-helm:
    name: Bump Helm image tag (main only)
    runs-on: self-hosted
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Helm values (image)
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          path = Path("helm/ai-studio/values.yaml")
          image = os.environ["IMAGE"]
          tag = os.environ["TAG"]

          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
          out: list[str] = []
          in_image = False

          for line in lines:
            if re.match(r"^image:\s*$", line):
              in_image = True
              out.append(line)
              continue

            if in_image and re.match(r"^[^\s]", line):
              in_image = False

            if in_image and re.match(r"^\s*repository:\s*", line):
              indent = re.match(r"^(\s*)", line).group(1)  # type: ignore[union-attr]
              out.append(f"{indent}repository: {image}\n")
              continue

            if in_image and re.match(r"^\s*tag:\s*", line):
              indent = re.match(r"^(\s*)", line).group(1)  # type: ignore[union-attr]
              out.append(f"{indent}tag: {tag}\n")
              continue

            out.append(line)

          path.write_text("".join(out), encoding="utf-8")
          PY

      - name: Commit and push Helm bump
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/ai-studio/values.yaml
          git commit -m "chore(cd): bump image tag to ${{ needs.docker.outputs.tag }}"
          for i in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "Failed to push after retries."
          exit 1
