name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --group dev

      - name: Format check
        run: uv run ruff format --check ./src

      - name: Lint
        run: uv run ruff check ./src

      - name: Type check
        run: uv run mypy ./src

      - name: Syntax check
        run: uv run python -m compileall -q ./src

  helm:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.20.0
      - run: helm lint helm/ai-studio
      - run: helm template ai-studio helm/ai-studio > /dev/null

  docker-build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ai-studio:ci
