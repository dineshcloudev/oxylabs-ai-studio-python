name: CD

on:
  push:
    branches: [main]
    # Prevent infinite loop when this workflow commits the updated image tag.
    paths-ignore:
      - helm/ai-studio/values.yaml

permissions:
  contents: write
  packages: write

jobs:
  build-push-and-bump:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        name: Compute image name and tag
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}

      - name: Update Helm values (image)
        uses: mikefarah/yq@v4.45.1
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
        with:
          cmd: yq -i '.image.repository = strenv(IMAGE) | .image.tag = strenv(TAG)' helm/ai-studio/values.yaml

      - name: Commit and push Helm bump
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/ai-studio/values.yaml
          git commit -m "chore(cd): bump image tag to ${{ steps.vars.outputs.tag }}"
          git push
