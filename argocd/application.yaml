apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-studio
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/<your-username>/oxylabs-ai-studio-py
    targetRevision: HEAD
    path: helm/ai-studio

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
